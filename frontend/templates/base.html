<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── SEO Meta Tags ── -->
  <title>{% block title %}MediGuide AI — Rural Healthcare Triage &amp; Remedy Companion{% endblock %}</title>
  <meta name="description" content="{% block description %}MediGuide AI provides instant AI-powered symptom triage, home remedies, and emergency warnings for rural communities in India. ML-backed, multilingual health companion.{% endblock %}">
  <meta name="keywords" content="rural health, AI doctor, symptom checker, home remedies, India healthcare, triage, emergency alerts">
  <meta name="author" content="MediGuide AI — BMS Institute AI Hackathon 2026">
  <meta name="robots" content="index, follow">

  <!-- ── Open Graph ── -->
  <meta property="og:title" content="MediGuide AI — Smart Rural Healthcare">
  <meta property="og:description" content="AI-powered symptom checker and triage companion for rural India.">
  <meta property="og:type" content="website">

  <!-- ── Google Fonts: Inter + Playfair Display ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

  <!-- ── Modular CSS (order matters) ── -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/panels.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/print.css') }}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  {% block content %}{% endblock %}

  <!-- ── Global Toast Container ── -->
  <div id="toastContainer"></div>

  <!-- ── Modular JavaScript (load order: config → auth → features → app) ── -->
  <script src="{{ url_for('static', filename='js/config.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bmi.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bodymap.js') }}"></script>
  <script src="{{ url_for('static', filename='js/remedies.js') }}"></script>
  <script src="{{ url_for('static', filename='js/emergency.js') }}"></script>
  <script src="{{ url_for('static', filename='js/report.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
